# ============================================================
# Nginx 反向代理配置 — Lime Calendar (flow-calendar)
# ============================================================
# 放置路径：/etc/nginx/conf.d/flow-calendar.conf
# 验证配置：nginx -t
# 重载配置：nginx -s reload
# ============================================================

upstream flow_calendar {
    server 127.0.0.1:3400;
    keepalive 64;
}

server {
    listen 80;
    server_name flow-calendar.gouxinjie.com;

    # 日志
    access_log /var/log/nginx/flow-calendar-access.log;
    error_log  /var/log/nginx/flow-calendar-error.log;

    # 客户端上传大小限制
    client_max_body_size 10m;

    # 静态资源缓存
    location /_next/static/ {
        alias /var/www/flow-calendar/app/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 公共静态文件
    location /public/ {
        alias /var/www/flow-calendar/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 反向代理到 Next.js
    location / {
        proxy_pass http://flow_calendar;
        proxy_http_version 1.1;

        # WebSocket 支持（热更新等）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传真实 IP 和协议
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 代理超时设置
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 隐藏 Nginx 版本号
    server_tokens off;
}

